<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VVIP QUANT | INSTANT ORDER</title>
    <meta name="mobile-web-app-capable" content="yes">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap');
        body { font-family: 'Roboto Mono', monospace; background-color: #000; color: #fff; touch-action: manipulation; }
        .amber { color: #FFA028; }
        .bg-panel { background-color: #080808; border: 1px solid #222; border-radius: 8px; }
        .price-up { color: #22c55e; }
        .price-down { color: #ef4444; }
        .btn-vvip { background: linear-gradient(135deg, #FFA028 0%, #CC801D 100%); transition: 0.3s; }
        .btn-alert { background: #ef4444; animation: blink 0.5s infinite; color: white; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body class="p-3 text-[11px] bg-black">

    <div class="grid grid-cols-3 gap-2 mb-2">
        <div class="bg-panel p-2 border-t-2 border-blue-500 text-center">
            <div class="text-[6px] text-zinc-500 uppercase font-bold">Win Rate</div>
            <div id="winRateDisplay" class="text-xs font-bold amber">0%</div>
        </div>
        <div class="bg-panel p-2 border-t-2 border-green-500 text-center">
            <div class="text-[6px] text-zinc-500 uppercase font-bold">Profit Total</div>
            <div id="totalProfitDisplay" class="text-xs font-bold text-green-500">$0</div>
        </div>
        <div class="bg-panel p-2 border-t-2 border-zinc-500 text-center">
            <div class="text-[6px] text-zinc-500 uppercase font-bold">Signal Count</div>
            <div id="tradeCount" class="text-xs font-bold text-zinc-300">0</div>
        </div>
    </div>

    <div class="bg-panel p-3 text-center mb-2 border-b-2 border-zinc-800">
        <div id="algoStatus" class="text-[7px] text-zinc-500 uppercase mb-1">Scanning Market...</div>
        <h1 class="text-4xl font-bold tracking-tighter" id="priceDisplay">----.--</h1>
    </div>

    <div id="signalContainer" class="bg-panel p-4 mb-2 border-l-4 border-zinc-800">
        <div class="flex justify-between items-center mb-3">
            <span id="setupLabel" class="text-zinc-600 font-bold uppercase italic text-[8px]">Analyse en cours...</span>
            <div id="statusIcon" class="text-[8px] bg-zinc-900 px-2 py-0.5 rounded">STANDBY</div>
        </div>
        
        <div class="space-y-2 opacity-20" id="levelData">
            <div class="flex justify-between border-b border-zinc-900 pb-1">
                <span class="text-zinc-600">MARKET SELL</span>
                <span id="fixEntry" class="font-bold text-amber">----.--</span>
            </div>
            <div class="flex justify-between text-[9px]">
                <span class="text-red-500">SL: <span id="fixSL">--</span></span>
                <span class="text-green-500">TP: <span id="fixTP">--</span></span>
            </div>
        </div>
    </div>

    <button id="copyBtn" onclick="copyVvip()" class="bg-zinc-900 text-zinc-700 w-full font-bold py-4 rounded-xl text-[10px] uppercase mb-3 shadow-inner cursor-not-allowed">
        ❌ Aucun Signal
    </button>

    <div class="bg-panel p-3 mb-2 border border-zinc-900">
        <div class="grid grid-cols-3 gap-2">
            <button onclick="recordTrade(30, 'GAIN')" class="bg-green-900/20 text-green-500 border border-green-900 py-1 rounded text-[7px] font-bold">GAIN</button>
            <button onclick="recordTrade(0, 'BE')" class="bg-zinc-800 text-zinc-400 border border-zinc-700 py-1 rounded text-[7px] font-bold">B.E</button>
            <button onclick="recordTrade(-10, 'PERTE')" class="bg-red-900/20 text-red-500 border border-red-900 py-1 rounded text-[7px] font-bold">PERTE</button>
        </div>
    </div>

    <div class="bg-panel p-2 h-16 overflow-y-auto text-[7px] text-zinc-600 font-mono" id="historyList"></div>

    <script>
        let state = "SCAN"; // SCAN, APPROACH, LOCKED
        let lastPrice = 0;
        let fixedData = { entry: 0, sl: 0, tp: 0 };
        let trades = JSON.parse(localStorage.getItem('mc_v19_record')) || [];
        const GOLDEN_ZONE = 5130.00;

        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(freq, dur) {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.05, ctx.currentTime);
            osc.start(); osc.stop(ctx.currentTime + dur);
        }

        function connectWS() {
            const ws = new WebSocket('wss://stream.binance.com:9443/ws/paxgusdt@ticker');
            ws.onmessage = (event) => {
                const price = parseFloat(JSON.parse(event.data).c);
                document.getElementById('priceDisplay').innerText = price.toFixed(2);
                document.getElementById('priceDisplay').className = price > lastPrice ? "text-4xl font-bold price-up" : "text-4xl font-bold price-down";
                
                // LOGIQUE DE DÉTECTION
                if (state !== "LOCKED") {
                    if (price >= (GOLDEN_ZONE - 2.00) && price < GOLDEN_ZONE) {
                        triggerApproach(price);
                    } else if (price >= GOLDEN_ZONE) {
                        triggerLock(price);
                    }
                }
                lastPrice = price;
            };
        }

        function triggerApproach(price) {
            state = "APPROACH";
            playSound(600, 0.1);
            document.getElementById('algoStatus').innerText = "⚠️ ZONE PROCHE : PRÉPARER SELL";
            document.getElementById('algoStatus').className = "text-[7px] text-amber animate-pulse font-bold";
            
            const btn = document.getElementById('copyBtn');
            btn.className = "bg-amber text-black w-full font-bold py-4 rounded-xl text-[10px] uppercase shadow-lg";
            btn.innerHTML = "📢 PRÉVENIR : SELL IMMINENT";
            btn.disabled = false;
            btn.style.cursor = "pointer";
        }

        function triggerLock(price) {
            state = "LOCKED";
            fixedData.entry = price;
            fixedData.sl = price + 24;
            fixedData.tp = price - 72;

            playSound(400, 0.5);
            document.getElementById('signalContainer').className = "bg-panel p-4 mb-2 border-l-4 border-red-600 shadow-[0_0_15px_rgba(239,68,68,0.3)]";
            document.getElementById('levelData').className = "space-y-2 opacity-100";
            document.getElementById('fixEntry').innerText = price.toFixed(2);
            document.getElementById('fixSL').innerText = fixedData.sl.toFixed(2);
            document.getElementById('fixTP').innerText = fixedData.tp.toFixed(2);
            document.getElementById('statusIcon').innerText = "LIVE NOW";
            document.getElementById('statusIcon').className = "text-[8px] bg-red-600 text-white px-2 py-0.5 rounded font-bold animate-pulse";

            const btn = document.getElementById('copyBtn');
            btn.className = "btn-alert w-full font-bold py-4 rounded-xl text-[10px] uppercase shadow-2xl";
            btn.innerHTML = "⚡ SELL MARKET NOW !";
        }

        function copyVvip() {
            let msg = "";
            if (state === "APPROACH") {
                msg = `⚠️ ALERTE VVIP MC ANTHONIO ⚠️\n\n🥇 GOLD (XAUUSD)\n📉 SELL IMMINENT\n\nPréparez-vous à entrer au prix du marché dans quelques secondes !`;
            } else if (state === "LOCKED") {
                msg = `⚡ SIGNAL VVIP : SELL NOW ⚡\n\n🥇 ASSET: XAUUSD\n📉 ORDRE: MARKET SELL (Instant)\n\n📍 ENTRY: ${fixedData.entry.toFixed(2)}\n🛑 SL: ${fixedData.sl.toFixed(2)}\n💰 TP: ${fixedData.tp.toFixed(2)}\n\n🔥 EXÉCUTION IMMÉDIATE !`;
            }
            if (msg) navigator.clipboard.writeText(msg).then(() => alert("Signal copié !"));
        }

        function recordTrade(val, type) {
            trades.unshift({ amount: val, type: type, date: new Date().toLocaleTimeString() });
            localStorage.setItem('mc_v19_record', JSON.stringify(trades));
            updateUI();
        }

        function updateUI() {
            const list = document.getElementById('historyList');
            list.innerHTML = '';
            let total = 0; let wins = 0;
            trades.forEach(t => {
                total += t.amount; if (t.type === 'GAIN') wins++;
                list.innerHTML += `<div class="flex justify-between border-b border-zinc-900 pb-1">
                    <span>${t.date} - ${t.type}</span>
                    <span class="${t.amount > 0 ? 'text-green-500' : 'text-red-500'}">${t.amount}$</span>
                </div>`;
            });
            document.getElementById('totalProfitDisplay').innerText = `$${total}`;
            document.getElementById('tradeCount').innerText = trades.length;
            document.getElementById('winRateDisplay').innerText = trades.length > 0 ? `${Math.round((wins/trades.length)*100)}%` : '0%';
        }

        window.onclick = () => { if (ctx.state === 'suspended') ctx.resume(); };
        window.onload = () => { connectWS(); updateUI(); };
    </script>
</body>
            </html>
