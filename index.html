<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>VVIP GOLD QUANT V28 | MC ANTHONIO</title>
    <style>
        :root { --gold: #D4AF37; --bg: #0a0e14; --card: #151b26; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Arial', sans-serif; margin: 0; padding: 20px; text-align: center; }
        .v28-container { max-width: 450px; margin: auto; border: 2px solid var(--gold); border-radius: 15px; padding: 20px; background: var(--card); }
        .mada-time { color: var(--gold); font-size: 1.5rem; font-weight: bold; margin-bottom: 15px; }
        .live-price { font-size: 4rem; font-weight: bold; color: #ff4d4d; margin: 20px 0; }
        .copy-box { background: rgba(255,255,255,0.05); border: 1px dashed var(--gold); padding: 15px; margin: 20px 0; }
        .btn-copy { background: var(--gold); color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 5px; }
        .footer-info { font-size: 0.7rem; color: #888; margin-top: 20px; }
    </style>
</head>
<body>

<div class="v28-container">
    <div class="mada-time" id="clock">ANTANANARIVO : 00:00:00</div>
    
    <div style="font-size: 0.8rem; opacity: 0.7;">GOLD SPOT (XAUUSD) - LIVE V28</div>
    <div class="live-price" id="price">5098.20</div>

    <div class="copy-box">
        <div id="signal-text" style="font-family: monospace; font-size: 0.8rem; margin-bottom: 10px;">
            GOLD SELL @ 5098.20 | SL: 5102.20 | TP1: 5093.20 | TP2: 5068.20
        </div>
        <button class="btn-copy" onclick="copySignal()">📋 COPIER LE SIGNAL V28</button>
    </div>

    <div style="display: flex; justify-content: space-between; font-size: 0.9rem;">
        <div>LOT : <span style="color:var(--gold)">0.02</span></div>
        <div>RISQUE : <span style="color:var(--gold)">RR 1:3</span></div>
    </div>

    <div class="footer-info">VVIP MC ANTHONIO - SIGNAL PRO MADA</div>
</div>

<script>
    // Horloge Mada
    function updateClock() {
        const options = { timeZone: 'Indian/Antananarivo', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
        document.getElementById('clock').innerText = "ANTANANARIVO : " + new Intl.DateTimeFormat('fr-FR', options).format(new Date());
    }

    // Flux de prix simulé (Réactivité V28)
    let currentPrice = 5098.20;
    setInterval(() => {
        currentPrice += (Math.random() * 0.2 - 0.1);
        document.getElementById('price').innerText = currentPrice.toFixed(2);
    }, 1000);

    // Fonction Copie
    function copySignal() {
        const text = document.getElementById('signal-text').innerText;
        navigator.clipboard.writeText(text);
        alert("Signal copié avec succès !");
    }

    setInterval(updateClock, 1000);
</script>

</body>
                                                                  </html>
