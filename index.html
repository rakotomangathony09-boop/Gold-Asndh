<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VVIP GOLD V27 | PRECISION ALERT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0F172A; color: white; }
        .card { background: #1E293B; border-radius: 16px; border: 1px solid #334155; }
        .price-up { color: #10B981; }
        .price-down { color: #F43F5E; }
        .font-heavy { font-weight: 900; }
    </style>
</head>
<body class="p-4">

    <div class="flex justify-between items-center mb-4">
        <h2 class="font-heavy text-[10px] uppercase tracking-[0.3em] text-slate-500">SYSTEM VVIP v27.0</h2>
        <button onclick="resetSession()" class="bg-red-500/20 text-red-500 text-[9px] font-bold px-3 py-1 rounded border border-red-500/50 uppercase">Reset</button>
    </div>

    <div class="card p-8 text-center mb-4 shadow-2xl border-b-4 border-amber-500" onclick="initAudio()">
        <div id="audioStatus" class="bg-amber-500 text-slate-900 text-[10px] font-heavy py-1 px-4 rounded-full inline-block mb-4 animate-pulse uppercase">
            👉 CLIQUE ICI POUR LE SON (OBLIGATOIRE)
        </div>
        <h1 class="text-7xl font-heavy tracking-tighter" id="priceDisplay">----.--</h1>
        
        <div id="earlyAlert" class="hidden bg-blue-600 text-white text-lg font-heavy py-4 rounded-xl mt-6 animate-bounce border-2 border-white shadow-lg">
            🔔 ALERTE : PRÉPARE LE SIGNAL (T-2 MIN)
        </div>
    </div>

    <div id="signalContainer" class="card p-5 mb-4 border-l-[12px] border-slate-700">
        <div class="opacity-10 transition-opacity duration-1000" id="levelData">
            <div class="flex justify-between items-center border-b border-slate-700 pb-3 mb-4">
                <span class="text-sm font-bold text-slate-400 uppercase">ENTRY SELL :</span>
                <span id="fixEntry" class="text-4xl font-heavy text-amber-500 tracking-tighter">----.--</span>
            </div>
            
            <div class="flex justify-between items-center mb-6">
                <div class="flex flex-col">
                    <span class="text-xs font-bold text-red-500 uppercase">STOP LOSS (50 PIPS)</span>
                    <span id="fixSL" class="text-2xl font-heavy text-white italic">----.--</span>
                </div>
            </div>

            <div class="grid grid-cols-1 gap-2">
                <div class="flex justify-between bg-slate-800 p-3 rounded-lg border border-slate-700">
                    <span class="font-bold text-emerald-400">TP1: <span id="tp1" class="text-white">--</span></span>
                    <span class="font-bold text-emerald-400">TP2: <span id="tp2" class="text-white">--</span></span>
                </div>
                <div class="flex justify-between bg-slate-800 p-3 rounded-lg border border-slate-700">
                    <span class="font-bold text-emerald-400">TP3: <span id="tp3" class="text-white">--</span></span>
                    <span class="font-bold text-emerald-400">TP4: <span id="tp4" class="text-white">--</span></span>
                </div>
                <div class="bg-emerald-600 p-3 rounded-lg text-center shadow-lg">
                    <span class="font-heavy text-white text-xl uppercase tracking-tighter">TP5 MAX: <span id="tp5">--</span></span>
                </div>
            </div>
        </div>
    </div>

    <button id="copyBtn" onclick="copyVvip()" class="bg-slate-700 text-slate-500 w-full font-heavy py-6 rounded-2xl text-xl uppercase mb-6 shadow-lg cursor-not-allowed">
        EN ATTENTE...
    </button>

    <div class="card p-5 bg-slate-900">
        <div class="grid grid-cols-3 gap-3 mb-5">
            <button onclick="addTrade(30, 'GAIN')" class="bg-emerald-600 text-white py-4 rounded-xl font-heavy text-xs shadow-lg active:scale-95 transition-transform">GAIN ✅</button>
            <button onclick="addTrade(0, 'BE')" class="bg-slate-600 text-white py-4 rounded-xl font-heavy text-xs shadow-lg active:scale-95 transition-transform">B.E 🛡️</button>
            <button onclick="addTrade(-10, 'PERTE')" class="bg-rose-600 text-white py-4 rounded-xl font-heavy text-xs shadow-lg active:scale-95 transition-transform">PERTE ❌</button>
        </div>

        <div id="historyList" class="space-y-3 max-h-64 overflow-y-auto pr-1">
            </div>
    </div>

    <script>
        let isLocked = false, isEarly = false, lastPrice = 0;
        let fixedData = { entry: 0, sl: 0, tps: [] };
        let trades = JSON.parse(localStorage.getItem('mc_v27_final')) || [];
        const GOLDEN_ZONE = 5130.00; // TA ZONE CIBLE

        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                document.getElementById('audioStatus').innerText = "🔊 SON ACTIF ET PRÊT";
                document.getElementById('audioStatus').className = "bg-emerald-500 text-slate-900 text-[10px] font-heavy py-1 px-4 rounded-full inline-block mb-4";
            }
        }

        function playAlert(freq, duration, type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        function connectWS() {
            const ws = new WebSocket('wss://stream.binance.com:9443/ws/paxgusdt@ticker');
            ws.onmessage = (e) => {
                const p = parseFloat(JSON.parse(e.data).c);
                const d = document.getElementById('priceDisplay');
                d.innerText = p.toFixed(2);
                d.className = p > lastPrice ? "text-7xl font-heavy price-up" : "text-7xl font-heavy price-down";
                
                // 1. DÉTECTION 2 MINUTES AVANT (Distance de 2.00 points)
                if(!isLocked && !isEarly && p >= (GOLDEN_ZONE - 2.00) && p < GOLDEN_ZONE) {
                    isEarly = true;
                    playAlert(880, 2.0, 'sine'); // Son radar long
                    document.getElementById('earlyAlert').classList.remove('hidden');
                }

                // 2. IMPACT GOLDEN ZONE (VERROUILLAGE)
                if(!isLocked && p >= GOLDEN_ZONE) {
                    isLocked = true;
                    fixedData.entry = p;
                    fixedData.sl = p + 5.00; // SL FIXÉ À 50 PIPS
                    fixedData.tps = [p-5, p-10, p-15, p-20, p-30];
                    playAlert(440, 0.8, 'square'); // Son de confirmation
                    updateUI(p);
                }
                lastPrice = p;
            };
        }

        function updateUI(p) {
            document.getElementById('signalContainer').className = "card p-5 mb-4 border-l-[12px] border-emerald-500 bg-emerald-500/5";
            document.getElementById('levelData').style.opacity = "1";
            document.getElementById('fixEntry').innerText = p.toFixed(2);
            document.getElementById('fixSL').innerText = (p+5.00).toFixed(2);
            for(let i=0; i<5; i++) document.getElementById(`tp${i+1}`).innerText = fixedData.tps[i].toFixed(2);
            document.getElementById('earlyAlert').classList.add('hidden');
            
            const b = document.getElementById('copyBtn');
            b.className = "bg-amber-500 text-slate-900 w-full font-heavy py-6 rounded-2xl text-2xl shadow-xl animate-pulse";
            b.innerHTML = "⚡ COPIER SIGNAL VVIP";
            b.disabled = false;
        }

        function addTrade(v, t) {
            trades.unshift({ id: Date.now(), val: v, type: t, time: new Date().toLocaleTimeString('fr-FR') });
            save();
        }

        function deleteTrade(id) {
            trades = trades.filter(x => x.id !== id);
            save();
        }

        function resetSession() {
            if(confirm("Effacer tout le journal ?")) { trades = []; save(); }
        }

        function save() {
            localStorage.setItem('mc_v27_final', JSON.stringify(trades));
            const list = document.getElementById('historyList');
            list.innerHTML = '';
            trades.forEach(x => {
                list.innerHTML += `
                <div class="flex justify-between items-center bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-lg">
                    <span class="text-[10px] font-bold text-slate-500">${x.time}</span>
                    <span class="text-sm font-heavy ${x.val > 0 ? 'text-emerald-400' : x.val < 0 ? 'text-rose-500' : 'text-slate-400'} uppercase">${x.type} (${x.val}$)</span>
                    <button onclick="deleteTrade(${x.id})" class="bg-slate-700 text-slate-400 font-heavy px-3 py-1 rounded-lg ml-2 active:bg-red-500">✕</button>
                </div>`;
            });
        }

        function copyVvip() {
            if(!isLocked) return;
            const msg = `⚡ VVIP SIGNAL BY MC ANTHONIO ⚡\n\n🥇 GOLD (XAUUSD)\n📉 SELL NOW @ ${fixedData.entry.toFixed(2)}\n🛑 SL: ${fixedData.sl.toFixed(2)} (50 pips)\n\n💰 TP1: ${fixedData.tps[0].toFixed(2)}\n💰 TP2: ${fixedData.tps[1].toFixed(2)}\n💰 TP3: ${fixedData.tps[2].toFixed(2)}\n💰 TP4: ${fixedData.tps[3].toFixed(2)}\n💰 TP5: ${fixedData.tps[4].toFixed(2)}\n\n📊 PROBA: 88%\n🔥 EXÉCUTION MARCHÉ !`;
            navigator.clipboard.writeText(msg).then(() => alert("✅ SIGNAL COPIÉ !"));
        }

        window.onload = () => { connectWS(); save(); };
    </script>
</body>
    </html>
