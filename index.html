<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VVIP QUANT | AUTO-LOCK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap');
        body { font-family: 'Roboto Mono', monospace; background-color: #000; color: #fff; touch-action: manipulation; }
        .amber { color: #FFA028; }
        .bg-panel { background-color: #080808; border: 1px solid #222; border-radius: 6px; }
        .price-up { color: #22c55e; }
        .price-down { color: #ef4444; }
        .btn-vvip { background: linear-gradient(135deg, #FFA028 0%, #CC801D 100%); }
        .status-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body class="p-2 text-[11px] bg-black">

    <div class="bg-[#FFA028] text-black font-bold px-3 py-2 flex justify-between items-center mb-2 rounded shadow-lg">
        <span class="text-[10px] uppercase italic">VVIP AUTO-ENGINE v13</span>
        <div id="algoStatus" class="flex items-center gap-1 text-[8px] bg-black text-white px-2 py-0.5 rounded">
            <span class="w-1.5 h-1.5 bg-blue-500 rounded-full status-pulse"></span> SCANNING ZONE...
        </div>
    </div>

    <div class="bg-panel p-3 text-center mb-2 border-b-2 border-zinc-700">
        <h1 class="text-4xl font-bold tracking-tighter" id="priceDisplay">----.--</h1>
    </div>

    <div id="signalContainer" class="bg-panel p-3 mb-2 border-l-4 border-zinc-700 transition-all duration-500">
        <div class="flex justify-between items-center mb-3">
            <span id="setupLabel" class="text-zinc-500 font-bold uppercase italic text-[9px]">En attente de zone...</span>
            <div id="lockIcon" class="text-zinc-700 font-bold text-lg">🔓</div>
        </div>
        
        <div class="space-y-2 opacity-40" id="levelData">
            <div class="flex justify-between border-b border-zinc-900 pb-1">
                <span class="text-zinc-600">ENTRY LIMIT</span>
                <span id="fixEntry" class="font-bold text-lg">----.--</span>
            </div>
            <div class="flex justify-between border-b border-zinc-900 pb-1">
                <span class="text-zinc-600">STOP LOSS</span>
                <span id="fixSL" class="font-bold text-lg">----.--</span>
            </div>
            <div class="flex justify-between">
                <span class="text-zinc-600">TAKE PROFIT</span>
                <span id="fixTP" class="font-bold text-lg">----.--</span>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-2 mb-2 text-center">
        <div class="bg-panel p-2">
            <div class="text-[7px] text-zinc-500 uppercase font-bold">Probabilité Gain</div>
            <div id="probText" class="font-bold text-zinc-600 italic uppercase">Waiting...</div>
        </div>
        <div class="bg-panel p-2">
            <div class="text-[7px] text-zinc-500 uppercase font-bold">Positions</div>
            <div id="posText" class="font-bold text-zinc-600 uppercase italic">--</div>
        </div>
    </div>

    <button id="copyBtn" onclick="copyVvip()" class="bg-zinc-800 text-zinc-500 w-full font-bold py-3 rounded-lg text-[10px] uppercase mb-2 cursor-not-allowed">
        ❌ Signal Non Verrouillé
    </button>

    <div class="bg-panel p-2 text-[8px] text-zinc-500 italic text-center border border-zinc-900">
        Zone de déclenchement auto détectée : <span class="amber font-bold">5130.00 - 5145.00</span>
    </div>

    <script>
        let isLocked = false;
        let lastPrice = 0;
        let fixedData = { entry: 0, sl: 0, tp: 0 };

        function connectWS() {
            const ws = new WebSocket('wss://stream.binance.com:9443/ws/paxgusdt@ticker');
            ws.onmessage = (event) => {
                const price = parseFloat(JSON.parse(event.data).c);
                document.getElementById('priceDisplay').innerText = price.toFixed(2);
                document.getElementById('priceDisplay').className = price > lastPrice ? "text-4xl font-bold price-up" : "text-4xl font-bold price-down";
                lastPrice = price;
                
                // LOGIQUE AUTO-LOCK
                // On verrouille si le prix entre dans la zone institutionnelle (ex: 5130+)
                if (!isLocked && price >= 5130.00) {
                    lockOrderAutomatically(price);
                }
            };
        }

        function lockOrderAutomatically(price) {
            isLocked = true;
            const risk = 24.00;
            fixedData.entry = price;
            fixedData.sl = price + risk;
            fixedData.tp = price - (risk * 3);

            // Mise à jour visuelle
            document.getElementById('signalContainer').className = "bg-panel p-3 mb-2 border-l-4 border-red-600 shadow-[0_0_15px_rgba(239,68,68,0.2)]";
            document.getElementById('levelData').className = "space-y-2 opacity-100";
            document.getElementById('setupLabel').innerText = "VVIP SELL LIMIT LOCKED";
            document.getElementById('setupLabel').className = "text-red-500 font-bold uppercase italic text-[9px]";
            document.getElementById('lockIcon').innerText = "🔒";
            document.getElementById('lockIcon').className = "text-red-500 font-bold text-lg animate-bounce";
            
            document.getElementById('algoStatus').innerText = "TARGET IDENTIFIED";
            document.getElementById('algoStatus').className = "flex items-center gap-1 text-[8px] bg-red-600 text-white px-2 py-0.5 rounded";

            document.getElementById('fixEntry').innerText = fixedData.entry.toFixed(2);
            document.getElementById('fixEntry').className = "amber font-bold text-lg";
            document.getElementById('fixSL').innerText = fixedData.sl.toFixed(2);
            document.getElementById('fixSL').className = "text-red-500 font-bold text-lg";
            document.getElementById('fixTP').innerText = fixedData.tp.toFixed(2);
            document.getElementById('fixTP').className = "text-green-500 font-bold text-lg";

            document.getElementById('probText').innerText = "HIGH (88%)";
            document.getElementById('probText').className = "font-bold text-green-500 uppercase";
            document.getElementById('posText').innerText = "3 POSITIONS";
            document.getElementById('posText').className = "font-bold text-white uppercase";

            const btn = document.getElementById('copyBtn');
            btn.className = "btn-vvip w-full text-black font-bold py-3 rounded-lg text-[10px] uppercase shadow-lg mb-2";
            btn.innerHTML = "📋 Copier le Signal Auto-Verrouillé";
            btn.style.cursor = "pointer";

            // Notification visuelle sonore
            try { window.navigator.vibrate(200); } catch(e) {}
        }

        function copyVvip() {
            if (!isLocked) return;
            const text = `⭐ VVIP AUTO-SIGNAL ⭐\n\n🥇 ASSET: XAUUSD\n📉 ORDER: SELL LIMIT\n📊 PROBABILITÉ: 88%\n💼 GESTION: 3 POSITIONS\n\n📍 ENTRY: ${fixedData.entry.toFixed(2)}\n🛑 SL: ${fixedData.sl.toFixed(2)}\n💰 TP: ${fixedData.tp.toFixed(2)}\n\n🔥 BY MC ANTHONIO QUANT`;
            navigator.clipboard.writeText(text).then(() => alert("Signal Auto-LOCKED copié !"));
        }

        window.onload = connectWS;
    </script>
</body>
        </html>
