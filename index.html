<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VVIP QUANT V24 | FINAL FIX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F3F4F6; color: #111827; touch-action: manipulation; }
        .card { background: white; border-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); border: 1px solid #E5E7EB; }
        .btn-vvip { background: #D97706; color: white; }
        .price-up { color: #059669; }
        .price-down { color: #DC2626; }
        .tp-box { background: #F0FDF4; border: 1px solid #BBF7D0; border-radius: 8px; text-align: center; padding: 4px; }
    </style>
</head>
<body class="p-4 text-[11px]">

    <div class="flex justify-between items-center mb-4 px-1">
        <h2 class="font-black text-[9px] uppercase tracking-widest text-gray-400">VVIP MC ANTHONIO v24</h2>
        <button onclick="resetSession()" class="text-[8px] font-bold text-red-500 bg-red-50 px-2 py-1 rounded border border-red-100">RESET TOUT</button>
    </div>

    <div class="card p-6 text-center mb-4" onclick="initAudio()">
        <div id="audioStatus" class="text-[8px] font-bold text-amber-600 mb-2 animate-pulse uppercase">🔔 Touchez ici pour le Son</div>
        <h1 class="text-6xl font-black tracking-tighter" id="priceDisplay">----.--</h1>
        <div id="earlyAlert" class="hidden bg-blue-600 text-white text-[10px] font-bold py-2 rounded-lg mt-3 animate-bounce">📢 ALERTE : ENTRÉE DANS 2 MIN !</div>
    </div>

    <div id="signalContainer" class="card p-4 mb-4 border-l-8 border-gray-300 transition-all">
        <div class="opacity-20" id="levelData">
            <div class="flex justify-between items-end border-b pb-2 mb-2">
                <span class="text-[10px] font-bold text-gray-400 uppercase">Market Sell @</span>
                <span id="fixEntry" class="font-black text-3xl text-amber-600">----.--</span>
            </div>
            <div class="text-[9px] font-bold text-red-500 uppercase mb-3">Stop Loss: <span id="fixSL">--</span></div>
            <div class="grid grid-cols-5 gap-1" id="tpGrid">
                <div class="tp-box"><div class="text-[6px] text-green-700 font-bold">TP1</div><div id="tp1" class="font-bold text-[9px]">--</div></div>
                <div class="tp-box"><div class="text-[6px] text-green-700 font-bold">TP2</div><div id="tp2" class="font-bold text-[9px]">--</div></div>
                <div class="tp-box"><div class="text-[6px] text-green-700 font-bold">TP3</div><div id="tp3" class="font-bold text-[9px]">--</div></div>
                <div class="tp-box"><div class="text-[6px] text-green-700 font-bold">TP4</div><div id="tp4" class="font-bold text-[9px]">--</div></div>
                <div class="tp-box"><div class="text-[6px] text-green-700 font-bold">TP5</div><div id="tp5" class="font-bold text-[9px]">--</div></div>
            </div>
        </div>
    </div>

    <button id="copyBtn" onclick="copyVvip()" class="bg-gray-200 text-gray-400 w-full font-black py-5 rounded-2xl text-[12px] uppercase mb-4 shadow-inner cursor-not-allowed">❌ Aucun Signal</button>

    <div class="card p-4">
        <div class="flex justify-between items-center mb-3">
            <span class="font-black text-[9px] uppercase">Journal de Session</span>
            <div class="flex gap-1">
                <button onclick="addTrade(30, 'GAIN')" class="bg-green-600 text-white px-3 py-1 rounded text-[8px] font-bold">GAIN</button>
                <button onclick="addTrade(0, 'BE')" class="bg-gray-400 text-white px-3 py-1 rounded text-[8px] font-bold">B.E</button>
                <button onclick="addTrade(-10, 'PERTE')" class="bg-red-600 text-white px-3 py-1 rounded text-[8px] font-bold">PERTE</button>
            </div>
        </div>
        <div id="historyList" class="space-y-2 max-h-40 overflow-y-auto">
            </div>
    </div>

    <script>
        let isLocked = false, isEarly = false, lastPrice = 0;
        let fixedData = { entry: 0, sl: 0, tps: [] };
        let trades = JSON.parse(localStorage.getItem('mc_final_journal')) || [];
        const GOLDEN_ZONE = 5130.00;

        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                document.getElementById('audioStatus').innerText = "✅ AUDIO ACTIVÉ";
                document.getElementById('audioStatus').className = "text-[8px] font-bold text-green-600 mb-2 uppercase";
            }
        }

        function playSound(f, d) {
            if (!audioCtx) return;
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.frequency.value = f; g.gain.value = 0.1;
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + d);
        }

        function connectWS() {
            const ws = new WebSocket('wss://stream.binance.com:9443/ws/paxgusdt@ticker');
            ws.onmessage = (e) => {
                const p = parseFloat(JSON.parse(e.data).c);
                const d = document.getElementById('priceDisplay');
                d.innerText = p.toFixed(2);
                d.className = p > lastPrice ? "text-6xl font-black price-up" : "text-6xl font-black price-down";
                
                if(!isLocked && !isEarly && p >= (GOLDEN_ZONE - 2.00) && p < GOLDEN_ZONE) {
                    isEarly = true; playSound(880, 0.8);
                    document.getElementById('earlyAlert').classList.remove('hidden');
                }
                if(!isLocked && p >= GOLDEN_ZONE) {
                    isLocked = true; fixedData.entry = p; fixedData.sl = p + 24;
                    fixedData.tps = [p-5, p-10, p-15, p-20, p-30];
                    playSound(440, 0.5); updateSignalUI(p);
                }
                lastPrice = p;
            };
        }

        function updateSignalUI(p) {
            document.getElementById('signalContainer').className = "card p-4 mb-4 border-l-8 border-red-600 bg-red-50";
            document.getElementById('levelData').style.opacity = "1";
            document.getElementById('fixEntry').innerText = p.toFixed(2);
            document.getElementById('fixSL').innerText = (p+24).toFixed(2);
            for(let i=0; i<5; i++) document.getElementById(`tp${i+1}`).innerText = fixedData.tps[i].toFixed(2);
            const b = document.getElementById('copyBtn');
            b.className = "bg-amber-600 text-white w-full font-black py-5 rounded-2xl text-[12px] shadow-lg animate-bounce";
            b.innerHTML = "⚡ COPIER SIGNAL VVIP";
        }

        function addTrade(v, t) {
            trades.unshift({ id: Date.now(), val: v, type: t, time: new Date().toLocaleTimeString() });
            saveAndShow();
        }

        function deleteTrade(id) {
            trades = trades.filter(x => x.id !== id);
            saveAndShow();
        }

        function resetSession() {
            if(confirm("Effacer tout le journal ?")) { trades = []; saveAndShow(); }
        }

        function saveAndShow() {
            localStorage.setItem('mc_final_journal', JSON.stringify(trades));
            const l = document.getElementById('historyList');
            l.innerHTML = '';
            trades.forEach(x => {
                l.innerHTML += `<div class="flex justify-between bg-gray-50 p-2 rounded-lg border border-gray-100 items-center">
                    <span class="text-[7px] text-gray-400 font-bold">${x.time}</span>
                    <span class="font-black ${x.val > 0 ? 'text-green-600' : x.val < 0 ? 'text-red-600' : 'text-gray-500'} uppercase">${x.type} (${x.val}$)</span>
                    <button onclick="deleteTrade(${x.id})" class="text-gray-300 px-2 font-bold">✕</button>
                </div>`;
            });
        }

        function copyVvip() {
            if(!isLocked) return;
            const msg = `⚡ VVIP SIGNAL BY MC ANTHONIO ⚡\n\n🥇 GOLD (XAUUSD)\n📉 SELL NOW @ ${fixedData.entry.toFixed(2)}\n🛑 SL: ${fixedData.sl.toFixed(2)}\n\n💰 TP1: ${fixedData.tps[0].toFixed(2)}\n💰 TP2: ${fixedData.tps[1].toFixed(2)}\n💰 TP3: ${fixedData.tps[2].toFixed(2)}\n💰 TP4: ${fixedData.tps[3].toFixed(2)}\n💰 TP5: ${fixedData.tps[4].toFixed(2)}\n\n📊 PROBA: 88%\n💼 GESTION: 3 POSITIONS\n\n🔥 EXÉCUTION MARCHÉ !`;
            navigator.clipboard.writeText(msg).then(() => alert("Signal copié !"));
        }

        window.onload = () => { connectWS(); saveAndShow(); };
    </script>
</body>
    </html>
