<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VVIP QUANT V25 | SL 50 PIPS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; color: #0F172A; touch-action: manipulation; }
        .card { background: white; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); border: 1px solid #F1F5F9; }
        .price-up { color: #10B981; }
        .price-down { color: #EF4444; }
        .tp-box { background: #F0FDF4; border: 1px solid #DCFCE7; border-radius: 10px; text-align: center; padding: 6px; }
    </style>
</head>
<body class="p-4 text-[11px]">

    <div class="flex justify-between items-center mb-4 px-1">
        <h2 class="font-black text-[9px] uppercase tracking-[0.2em] text-slate-400">VVIP MC ANTHONIO v25</h2>
        <button onclick="resetSession()" class="text-[8px] font-bold text-red-500 bg-red-50 px-3 py-1 rounded-full border border-red-100 uppercase">Effacer Session</button>
    </div>

    <div class="card p-6 text-center mb-4 border-b-4 border-amber-500" onclick="initAudio()">
        <div id="audioStatus" class="text-[8px] font-bold text-amber-500 mb-2 animate-pulse uppercase tracking-widest">🔔 Activez le son ici</div>
        <h1 class="text-6xl font-black tracking-tighter" id="priceDisplay">----.--</h1>
        <div id="earlyAlert" class="hidden bg-indigo-600 text-white text-[10px] font-bold py-2 rounded-xl mt-4 animate-bounce uppercase">📢 Attention : Zone proche (2 min)</div>
    </div>

    <div id="signalContainer" class="card p-5 mb-4 border-l-[10px] border-slate-200 transition-all duration-500">
        <div class="opacity-10" id="levelData">
            <div class="flex justify-between items-end border-b border-slate-100 pb-3 mb-3">
                <span class="text-[10px] font-bold text-slate-400 uppercase">Sell Market @</span>
                <span id="fixEntry" class="font-black text-3xl text-amber-600">----.--</span>
            </div>
            <div class="flex justify-between items-center mb-4">
                <div class="flex flex-col">
                    <span class="text-[8px] font-bold text-red-400 uppercase">Stop Loss (50 Pips)</span>
                    <span id="fixSL" class="font-black text-red-600 text-xl tracking-tight">--</span>
                </div>
            </div>
            <div class="grid grid-cols-5 gap-2" id="tpGrid">
                <div class="tp-box"><div class="text-[7px] text-green-600 font-bold uppercase">TP1</div><div id="tp1" class="font-black text-[10px]">--</div></div>
                <div class="tp-box"><div class="text-[7px] text-green-600 font-bold uppercase">TP2</div><div id="tp2" class="font-black text-[10px]">--</div></div>
                <div class="tp-box"><div class="text-[7px] text-green-600 font-bold uppercase">TP3</div><div id="tp3" class="font-black text-[10px]">--</div></div>
                <div class="tp-box"><div class="text-[7px] text-green-600 font-bold uppercase">TP4</div><div id="tp4" class="font-black text-[10px]">--</div></div>
                <div class="tp-box"><div class="text-[7px] text-green-600 font-bold uppercase">TP5</div><div id="tp5" class="font-black text-[10px]">--</div></div>
            </div>
        </div>
    </div>

    <button id="copyBtn" onclick="copyVvip()" class="bg-slate-200 text-slate-400 w-full font-black py-5 rounded-2xl text-[13px] uppercase mb-4 shadow-inner cursor-not-allowed">❌ En attente de zone</button>

    <div class="card p-5">
        <div class="flex justify-between items-center mb-4">
            <span class="font-black text-[10px] uppercase tracking-tight text-slate-500">Journal de Session</span>
            <div class="flex gap-2">
                <button onclick="addTrade(30, 'GAIN')" class="bg-emerald-600 text-white px-3 py-1.5 rounded-lg text-[9px] font-bold shadow-md">GAIN</button>
                <button onclick="addTrade(0, 'BE')" class="bg-slate-500 text-white px-3 py-1.5 rounded-lg text-[9px] font-bold shadow-md">B.E</button>
                <button onclick="addTrade(-10, 'PERTE')" class="bg-red-600 text-white px-3 py-1.5 rounded-lg text-[9px] font-bold shadow-md">PERTE</button>
            </div>
        </div>
        <div id="historyList" class="space-y-2 max-h-48 overflow-y-auto pr-1">
            </div>
    </div>

    <script>
        let isLocked = false, isEarly = false, lastPrice = 0;
        let fixedData = { entry: 0, sl: 0, tps: [] };
        let trades = JSON.parse(localStorage.getItem('mc_v25_journal')) || [];
        const GOLDEN_ZONE = 5130.00;

        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                document.getElementById('audioStatus').innerText = "✅ SON ACTIF";
                document.getElementById('audioStatus').className = "text-[8px] font-bold text-emerald-500 mb-2 uppercase";
            }
        }

        function playSound(f, d) {
            if (!audioCtx) return;
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.frequency.value = f; g.gain.value = 0.15;
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + d);
        }

        function connectWS() {
            const ws = new WebSocket('wss://stream.binance.com:9443/ws/paxgusdt@ticker');
            ws.onmessage = (e) => {
                const p = parseFloat(JSON.parse(e.data).c);
                const d = document.getElementById('priceDisplay');
                d.innerText = p.toFixed(2);
                d.className = p > lastPrice ? "text-6xl font-black price-up" : "text-6xl font-black price-down";
                
                // Alerte 2.00 pts avant
                if(!isLocked && !isEarly && p >= (GOLDEN_ZONE - 2.00) && p < GOLDEN_ZONE) {
                    isEarly = true; playSound(880, 1.0);
                    document.getElementById('earlyAlert').classList.remove('hidden');
                }
                // Lock Zone
                if(!isLocked && p >= GOLDEN_ZONE) {
                    isLocked = true;
                    fixedData.entry = p;
                    fixedData.sl = p + 5.00; // FIXATION SL 50 PIPS
                    fixedData.tps = [p-5, p-10, p-15, p-20, p-30];
                    playSound(440, 0.6); updateUI(p);
                }
                lastPrice = p;
            };
        }

        function updateUI(p) {
            document.getElementById('signalContainer').className = "card p-5 mb-4 border-l-[10px] border-red-600 bg-red-50/50";
            document.getElementById('levelData').style.opacity = "1";
            document.getElementById('fixEntry').innerText = p.toFixed(2);
            document.getElementById('fixSL').innerText = (p+5.00).toFixed(2);
            for(let i=0; i<5; i++) document.getElementById(`tp${i+1}`).innerText = fixedData.tps[i].toFixed(2);
            const b = document.getElementById('copyBtn');
            b.className = "bg-amber-600 text-white w-full font-black py-5 rounded-2xl text-[13px] shadow-lg animate-bounce";
            b.innerHTML = "⚡ SELL MARKET NOW (SL 50 PIPS)";
            b.disabled = false;
        }

        function addTrade(v, t) {
            trades.unshift({ id: Date.now(), val: v, type: t, time: new Date().toLocaleTimeString('fr-FR') });
            refreshJournal();
        }

        function deleteTrade(id) {
            trades = trades.filter(x => x.id !== id);
            refreshJournal();
        }

        function resetSession() {
            if(confirm("Vider l'historique de la session ?")) { trades = []; refreshJournal(); }
        }

        function refreshJournal() {
            localStorage.setItem('mc_v25_journal', JSON.stringify(trades));
            const l = document.getElementById('historyList');
            l.innerHTML = '';
            trades.forEach(x => {
                l.innerHTML += `<div class="flex justify-between bg-white p-3 rounded-xl border border-slate-100 items-center shadow-sm">
                    <span class="text-[8px] text-slate-400 font-bold">${x.time}</span>
                    <span class="font-black ${x.val > 0 ? 'text-emerald-600' : x.val < 0 ? 'text-red-600' : 'text-slate-500'} uppercase">${x.type} (${x.val >= 0 ? '+' : ''}${x.val}$)</span>
                    <button onclick="deleteTrade(${x.id})" class="text-slate-300 px-2 font-bold hover:text-red-500 transition-colors">✕</button>
                </div>`;
            });
        }

        function copyVvip() {
            if(!isLocked) return;
            const msg = `⚡ VVIP SIGNAL BY MC ANTHONIO ⚡\n\n🥇 GOLD (XAUUSD)\n📉 SELL NOW @ ${fixedData.entry.toFixed(2)}\n🛑 SL: ${fixedData.sl.toFixed(2)} (50 pips)\n\n💰 TP1: ${fixedData.tps[0].toFixed(2)}\n💰 TP2: ${fixedData.tps[1].toFixed(2)}\n💰 TP3: ${fixedData.tps[2].toFixed(2)}\n💰 TP4: ${fixedData.tps[3].toFixed(2)}\n💰 TP5: ${fixedData.tps[4].toFixed(2)}\n\n📊 PROBA: 88%\n💼 GESTION: 3 POSITIONS`;
            navigator.clipboard.writeText(msg).then(() => alert("Signal copié !"));
        }

        window.onload = () => { connectWS(); refreshJournal(); };
    </script>
</body>
            </html>
