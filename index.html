<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VVIP QUANT | TRACK RECORD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap');
        body { font-family: 'Roboto Mono', monospace; background-color: #000; color: #fff; touch-action: manipulation; }
        .amber { color: #FFA028; }
        .bg-panel { background-color: #080808; border: 1px solid #222; border-radius: 6px; }
        .price-up { color: #22c55e; }
        .price-down { color: #ef4444; }
        .btn-vvip { background: linear-gradient(135deg, #FFA028 0%, #CC801D 100%); }
        ::-webkit-scrollbar { width: 2px; }
        ::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body class="p-2 text-[11px] bg-black">

    <div class="bg-[#FFA028] text-black font-bold px-3 py-2 flex justify-between items-center mb-2 rounded shadow-lg">
        <span class="text-[10px] uppercase">VVIP MC ANTHONIO | V11.0</span>
        <span class="text-[8px] opacity-75">TRACK RECORD ACTIVE</span>
    </div>

    <div class="grid grid-cols-3 gap-2 mb-2">
        <div class="bg-panel p-2 border-t-2 border-blue-500 text-center">
            <div class="text-zinc-500 text-[7px] uppercase">Profit Total</div>
            <div id="statTotal" class="text-sm font-bold text-green-500">$0</div>
        </div>
        <div class="bg-panel p-2 border-t-2 border-amber text-center">
            <div class="text-zinc-500 text-[7px] uppercase">Win Rate</div>
            <div id="statWinRate" class="text-sm font-bold text-amber">0%</div>
        </div>
        <div class="bg-panel p-2 border-t-2 border-purple-500 text-center">
            <div class="text-zinc-500 text-[7px] uppercase">Trades</div>
            <div id="statCount" class="text-sm font-bold">0</div>
        </div>
    </div>

    <div class="bg-panel p-3 text-center mb-2 border-b-2 border-red-600">
        <h1 class="text-4xl font-bold tracking-tighter" id="priceDisplay">----.--</h1>
        <div class="text-red-500 font-bold text-[10px] mt-1 tracking-[3px]">SELL LIMIT ORDER</div>
    </div>

    <div class="bg-panel p-3 mb-2">
        <div class="flex gap-2">
            <input id="tradeAmount" type="number" placeholder="Profit/Perte ($)" class="bg-zinc-900 border border-zinc-700 rounded px-2 py-1 w-full text-white outline-none">
            <button onclick="addTradeToHistory()" class="bg-amber text-black font-bold px-4 py-1 rounded text-[9px] uppercase">Clôturer</button>
        </div>
    </div>

    <div class="bg-panel p-3 mb-2">
        <div class="flex justify-between items-center mb-2 border-b border-zinc-800 pb-1">
            <span class="amber font-bold uppercase text-[8px]">Historique des Trades</span>
            <button onclick="clearHistory()" class="text-red-500 text-[7px] uppercase underline">Reset</button>
        </div>
        <div id="historyList" class="h-24 overflow-y-auto space-y-1">
            </div>
    </div>

    <div class="bg-panel h-32 overflow-hidden rounded border border-zinc-800 mb-2">
        <div id="tradingview_chart" style="height:100%;width:100%"></div>
        <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
        <script type="text/javascript">
            new TradingView.widget({ "autosize": true, "symbol": "OANDA:XAUUSD", "interval": "15", "theme": "dark", "style": "1", "hide_top_toolbar": true, "container_id": "tradingview_chart" });
        </script>
    </div>

    <button onclick="copyVvip()" class="btn-vvip w-full text-black font-bold py-3 rounded-lg text-[10px] uppercase shadow-lg">
        Copy VVIP Signal
    </button>

    <script>
        let trades = JSON.parse(localStorage.getItem('vvip_trades')) || [];

        function connectWS() {
            const ws = new WebSocket('wss://stream.binance.com:9443/ws/paxgusdt@ticker');
            ws.onmessage = (event) => {
                const price = parseFloat(JSON.parse(event.data).c);
                document.getElementById('priceDisplay').innerText = price.toFixed(2);
                document.getElementById('priceDisplay').className = price > lastPrice ? "text-4xl font-bold price-up" : "text-4xl font-bold price-down";
                lastPrice = price;
            };
            let lastPrice = 0;
        }

        function addTradeToHistory() {
            const amountInput = document.getElementById('tradeAmount');
            const amount = parseFloat(amountInput.value);
            if (isNaN(amount)) return;

            const newTrade = {
                id: Date.now(),
                amount: amount,
                date: new Date().toLocaleDateString('fr-FR'),
                time: new Date().toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'})
            };

            trades.unshift(newTrade);
            localStorage.setItem('vvip_trades', JSON.stringify(trades));
            amountInput.value = '';
            renderAll();
        }

        function renderAll() {
            const list = document.getElementById('historyList');
            list.innerHTML = '';
            let total = 0;
            let wins = 0;

            trades.forEach(t => {
                total += t.amount;
                if (t.amount > 0) wins++;
                
                const div = document.createElement('div');
                div.className = "flex justify-between items-center text-[8px] border-b border-zinc-900 pb-1";
                div.innerHTML = `
                    <span class="text-zinc-500">${t.date} ${t.time}</span>
                    <span class="${t.amount >= 0 ? 'text-green-500' : 'text-red-500'} font-bold">
                        ${t.amount >= 0 ? '+' : ''}${t.amount.toFixed(2)}$
                    </span>
                `;
                list.appendChild(div);
            });

            const winRate = trades.length > 0 ? (wins / trades.length * 100).toFixed(0) : 0;
            document.getElementById('statTotal').innerText = `$${total.toFixed(2)}`;
            document.getElementById('statTotal').className = total >= 0 ? "text-sm font-bold text-green-500" : "text-sm font-bold text-red-500";
            document.getElementById('statWinRate').innerText = `${winRate}%`;
            document.getElementById('statCount').innerText = trades.length;
        }

        function clearHistory() { if(confirm("Effacer tout l'historique ?")) { trades = []; localStorage.removeItem('vvip_trades'); renderAll(); } }

        window.onload = () => { connectWS(); renderAll(); };
    </script>
</body>
            </html>
