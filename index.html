<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VVIP GOLD QUANT | MC ANTHONIO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap');
        body { font-family: 'Roboto Mono', monospace; background-color: #000; color: #fff; touch-action: manipulation; }
        .amber { color: #FFA028; }
        .bg-panel { background-color: #080808; border: 1px solid #222; border-radius: 6px; }
        .price-up { color: #22c55e; }
        .price-down { color: #ef4444; }
        .btn-vvip { background: linear-gradient(135deg, #FFA028 0%, #CC801D 100%); box-shadow: 0 0 15px rgba(255, 160, 40, 0.3); }
    </style>
</head>
<body class="p-2 text-[11px] bg-black">

    <div class="bg-[#FFA028] text-black font-bold px-3 py-2 flex justify-between items-center mb-2 rounded shadow-lg">
        <span class="text-[10px] uppercase tracking-widest text-center w-full">VVIP SIGNAL BY MC ANTHONIO</span>
    </div>

    <div class="bg-panel p-3 mb-2 border-l-4 border-amber flex justify-between items-center">
        <div>
            <div class="text-zinc-500 text-[8px] uppercase font-bold">Probabilité de Gain</div>
            <div id="probScore" class="text-xl font-bold amber">ANALYSIS...</div>
        </div>
        <div class="text-right">
            <div class="text-zinc-500 text-[8px] uppercase font-bold">Trades Recommandés</div>
            <div id="tradeCount" class="text-xl font-bold text-white">--</div>
        </div>
    </div>

    <div class="flex flex-col gap-2">
        <div class="bg-panel p-3 text-center border-b-2 border-red-600">
            <h1 class="text-5xl font-bold tracking-tighter" id="priceDisplay">----.--</h1>
            <div class="text-red-500 font-bold text-sm mt-1 tracking-[4px]">SELL LIMIT</div>
        </div>

        <div class="bg-panel p-3 space-y-2">
            <div class="flex justify-between items-center border-b border-zinc-800 pb-1">
                <span class="text-zinc-500 uppercase text-[9px]">Entry Point</span>
                <span class="text-xl font-bold amber" id="valEntry">----.--</span>
            </div>
            <div class="flex justify-between items-center border-b border-zinc-800 pb-1 text-red-500 font-bold">
                <span class="uppercase text-[9px]">Stop Loss</span>
                <span class="text-xl font-bold" id="valSL">----.--</span>
            </div>
            <div class="flex justify-between items-center text-green-500 font-bold">
                <span class="uppercase text-[9px]">TP Final (RR 1:3)</span>
                <span class="text-xl font-bold" id="valTP">----.--</span>
            </div>
        </div>

        <div class="bg-panel h-48 overflow-hidden rounded border border-zinc-800">
            <div id="tradingview_chart" style="height:100%;width:100%"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
            <script type="text/javascript">
                new TradingView.widget({
                    "autosize": true, "symbol": "OANDA:XAUUSD", "interval": "15",
                    "theme": "dark", "style": "1", "locale": "fr",
                    "hide_top_toolbar": true, "hide_legend": true, "container_id": "tradingview_chart"
                });
            </script>
        </div>

        <button onclick="copyVvipSignal()" class="btn-vvip text-black font-bold py-3 rounded-lg flex flex-col items-center shadow-lg active:scale-95 transition-transform">
            <span class="text-[10px]">COPY VVIP SIGNAL</span>
            <span class="text-[7px] opacity-75 italic" id="copySubtext">Calculated by Probability Engine</span>
        </button>
    </div>

    <script>
        let lastPrice = 0;

        const connectWS = () => {
            const ws = new WebSocket('wss://stream.binance.com:9443/ws/paxgusdt@ticker');
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                const price = parseFloat(data.c);
                const priceDisplay = document.getElementById('priceDisplay');
                
                if (price > lastPrice) priceDisplay.className = "text-5xl font-bold price-up tracking-tighter";
                else if (price < lastPrice) priceDisplay.className = "text-5xl font-bold price-down tracking-tighter";
                
                priceDisplay.innerText = price.toFixed(2);
                lastPrice = price;
                updateStrategy(price);
            };
            ws.onclose = () => setTimeout(connectWS, 2000);
        };

        function updateStrategy(price) {
            const risk = 24.00;
            const entryLimit = price + 1.20;
            const sl = entryLimit + risk;
            const tp = entryLimit - (risk * 3); // RR 1:3 fixe

            document.getElementById('valEntry').innerText = entryLimit.toFixed(2);
            document.getElementById('valSL').innerText = sl.toFixed(2);
            document.getElementById('valTP').innerText = tp.toFixed(2);

            // LOGIQUE DE PROBABILITÉ & NOMBRE DE TRADES
            const distToSupply = Math.abs(5145 - price);
            let prob, trades;

            if (distToSupply < 15) {
                prob = "HIGH (85%)";
                trades = "3 positions";
                document.getElementById('probScore').className = "text-xl font-bold text-green-500";
            } else if (distToSupply < 40) {
                prob = "MEDIUM (65%)";
                trades = "2 positions";
                document.getElementById('probScore').className = "text-xl font-bold amber";
            } else {
                prob = "LOW (45%)";
                trades = "1 position";
                document.getElementById('probScore').className = "text-xl font-bold text-red-500";
            }

            document.getElementById('probScore').innerText = prob;
            document.getElementById('tradeCount').innerText = trades;
        }

        function copyVvipSignal() {
            const entry = document.getElementById('valEntry').innerText;
            const sl = document.getElementById('valSL').innerText;
            const tp = document.getElementById('valTP').innerText;
            const prob = document.getElementById('probScore').innerText;
            const trades = document.getElementById('tradeCount').innerText;
            
            const text = `⭐ VVIP SIGNAL BY MC ANTHONIO ⭐\n\n🥇 ASSET: XAUUSD (GOLD)\n📉 ORDER: SELL LIMIT\n📊 PROBABILITÉ: ${prob}\n💼 GESTION: Ouvrir ${trades}\n\n📍 ENTRY: ${entry}\n🛑 STOP LOSS: ${sl}\n💰 TAKE PROFIT: ${tp}\n\n🔥 RR 1:3 | SMART MONEY FLOW`;
            
            navigator.clipboard.writeText(text).then(() => {
                alert("Signal VVIP + Gestion de risque copiés !");
            });
        }

        window.onload = connectWS;
    </script>
</body>
                </html>
