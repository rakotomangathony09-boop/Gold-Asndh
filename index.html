<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VVIP GOLD V28 | CLARTÉ PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F9FAFB; color: #111827; touch-action: manipulation; }
        .card { background: white; border-radius: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #E5E7EB; }
        .btn-vvip { background: #D97706; color: white; transition: 0.2s; }
        .btn-vvip:active { transform: scale(0.96); }
        .price-up { color: #059669; }
        .price-down { color: #DC2626; } /* Rouge profond pour baisse */
        .heavy { font-weight: 900; }
        .tp-grid { display: grid; grid-template-cols: repeat(5, 1fr); gap: 6px; margin-top: 10px; }
        .tp-box { background: #F0FDF4; border: 1px solid #BBF7D0; border-radius: 10px; text-align: center; padding: 6px; }
    </style>
</head>
<body class="p-4 text-[12px]">

    <div class="flex justify-between items-center mb-4 px-1">
        <h2 class="heavy text-[10px] uppercase tracking-widest text-slate-400">VVIP MC ANTHONIO v28.0</h2>
        <button onclick="resetSession()" class="text-[9px] font-bold text-red-600 bg-red-50 px-3 py-1.5 rounded-full border border-red-100 uppercase italic">Reset</button>
    </div>

    <div class="card p-8 text-center mb-4 border-b-8 border-amber-500 shadow-lg" onclick="initAudio()">
        <span class="text-[10px] text-slate-400 heavy uppercase tracking-widest">XAUUSD Live Price</span>
        <h1 class="text-7xl heavy tracking-tighter my-2 price-down" id="priceDisplay">----.--</h1>
        
        <div id="audioStatus" class="bg-amber-100 text-amber-800 text-[9px] font-heavy py-1.5 px-4 rounded-full inline-block mt-2 animate-pulse uppercase cursor-pointer border border-amber-200 shadow-inner">
            👉 CLIQUE ICI POUR LE SON
        </div>
        
        <div id="earlyAlert" class="hidden bg-blue-100 text-blue-800 text-[11px] font-heavy py-3 rounded-xl mt-4 animate-bounce border border-blue-200">
            📢 ALERTE : ENTRÉE DANS 2 MINUTES !
        </div>
    </div>

    <div class="grid grid-cols-2 gap-3 mb-4">
        <div class="card p-4 text-center border-t-4 border-blue-500">
            <div class="text-[9px] text-slate-500 heavy uppercase">Probabilité</div>
            <div class="heavy text-blue-600 text-base">88% HIGH</div>
        </div>
        <div class="card p-4 text-center border-t-4 border-amber-500">
            <div class="text-[9px] text-slate-500 heavy uppercase">Positions</div>
            <div class="heavy text-slate-900 text-base">3 POSITIONS</div>
        </div>
    </div>

    <div id="signalContainer" class="card p-5 mb-4 border-l-[12px] border-slate-300 transition-all duration-500">
        <div class="flex justify-between items-center mb-4">
            <span id="setupLabel" class="heavy text-[10px] uppercase tracking-wider text-slate-400 italic">Scanning...</span>
            <span id="lockStatus" class="bg-slate-100 text-slate-500 text-[9px] px-3 py-1 rounded-full font-heavy uppercase border border-slate-200">Ready</span>
        </div>
        
        <div class="opacity-15 transition-opacity duration-1000" id="levelData">
            <div class="flex justify-between items-end border-b-2 border-slate-100 pb-3 mb-4">
                <span class="text-[11px] font-heavy text-slate-900 uppercase">Sell Market @</span>
                <span id="fixEntry" class="heavy text-4xl text-amber-600 tracking-tighter">----.--</span>
            </div>
            <div class="flex justify-between items-center mb-5 px-1">
                <div class="flex flex-col"><span class="text-[9px] text-slate-500 heavy uppercase">Stop Loss</span><span id="fixSL" class="heavy text-red-600 text-2xl tracking-tight">--</span></div>
            </div>
            
            <div class="tp-grid">
                <div class="tp-box"><div class="heavy text-emerald-800 text-[7px]">TP1</div><div id="tp1" class="heavy text-base text-slate-950">--</div></div>
                <div class="tp-box"><div class="heavy text-emerald-800 text-[7px]">TP2</div><div id="tp2" class="heavy text-base text-slate-950">--</div></div>
                <div class="tp-box"><div class="heavy text-emerald-800 text-[7px]">TP3</div><div id="tp3" class="heavy text-base text-slate-950">--</div></div>
                <div class="tp-box"><div class="heavy text-emerald-800 text-[7px]">TP4</div><div id="tp4" class="heavy text-base text-slate-950">--</div></div>
                <div class="tp-box"><div class="heavy text-emerald-800 text-[7px]">TP5 MAX</div><div id="tp5" class="heavy text-base text-slate-950">--</div></div>
            </div>
        </div>
    </div>

    <button id="copyBtn" onclick="copyVvip()" class="bg-slate-200 text-slate-500 w-full heavy py-6 rounded-3xl text-[14px] uppercase mb-5 shadow-inner cursor-not-allowed">
        ❌ Aucun Signal
    </button>

    <div class="card p-5">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-[11px] heavy uppercase tracking-tighter">Journal de Session</h3>
            <div class="flex gap-1.5">
                <button onclick="addTrade(30, 'GAIN')" class="bg-emerald-600 text-white px-4 py-2 rounded-xl text-[10px] font-heavy shadow-md">GAIN ✅</button>
                <button onclick="addTrade(0, 'BE')" class="bg-slate-500 text-white px-4 py-2 rounded-xl text-[10px] font-heavy shadow-md">B.E 🛡️</button>
                <button onclick="addTrade(-10, 'PERTE')" class="bg-red-600 text-white px-4 py-2 rounded-xl text-[10px] font-heavy shadow-md">PERTE ❌</button>
            </div>
        </div>
        <div id="historyList" class="space-y-2 max-h-48 overflow-y-auto pr-1">
            </div>
    </div>

    <script>
        let isLocked = false, isEarly = false, lastPrice = 0;
        let fixedData = { entry: 0, sl: 0, tps: [] };
        let trades = JSON.parse(localStorage.getItem('mc_clartepro_v28')) || [];
        const GOLDEN_ZONE = 5130.00; // TA ZONE CIBLE

        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                document.getElementById('audioStatus').innerText = "🔊 SON ACTIF ET PRÊT";
                document.getElementById('audioStatus').className = "bg-emerald-100 text-emerald-800 text-[9px] font-heavy py-1.5 px-4 rounded-full inline-block mt-2 border border-emerald-200";
            }
        }

        function playAlert(freq, duration, type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        function connectWS() {
            const ws = new WebSocket('wss://stream.binance.com:9443/ws/paxgusdt@ticker');
            ws.onmessage = (e) => {
                const p = parseFloat(JSON.parse(e.data).c);
                const d = document.getElementById('priceDisplay');
                d.innerText = p.toFixed(2);
                d.className = p > lastPrice ? "text-7xl heavy price-up my-2" : "text-7xl heavy price-down my-2";
                
                // 1. DÉTECTION 2 MIN AVANT (Distance de 2.00 pts V27)
                if(!isLocked && !isEarly && p >= (GOLDEN_ZONE - 2.00) && p < GOLDEN_ZONE) {
                    isEarly = true;
                    playAlert(880, 2.0, 'sine'); // Son radar long
                    document.getElementById('earlyAlert').classList.remove('hidden');
                }

                // 2. VERROUILLAGE (V27)
                if(!isLocked && p >= GOLDEN_ZONE) {
                    isLocked = true;
                    fixedData.entry = p;
                    fixedData.sl = p + 5.00; // SL 50 PIPS FIXE
                    fixedData.tps = [p-5, p-10, p-15, p-20, p-30];
                    playAlert(440, 0.8, 'square'); // Confirmation
                    updateUI(p);
                }
                lastPrice = p;
            };
        }

        function updateUI(p) {
            document.getElementById('signalContainer').className = "card p-5 mb-4 border-l-[12px] border-emerald-500 bg-emerald-50";
            document.getElementById('levelData').style.opacity = "1";
            document.getElementById('lockStatus').innerText = "🔴 LIVE";
            document.getElementById('lockStatus').className = "bg-emerald-500 text-white text-[9px] px-3 py-1 rounded-full font-heavy border-0";
            document.getElementById('setupLabel').innerText = "VVIP INSTITUTIONAL SELL";
            document.getElementById('setupLabel').className = "heavy text-[11px] uppercase text-emerald-700 italic";
            
            document.getElementById('fixEntry').innerText = p.toFixed(2);
            document.getElementById('fixSL').innerText = (p+5.00).toFixed(2);
            for(let i=0; i<5; i++) document.getElementById(`tp${i+1}`).innerText = fixedData.tps[i].toFixed(2);
            document.getElementById('earlyAlert').classList.add('hidden');
            
            const b = document.getElementById('copyBtn');
            b.className = "bg-amber-600 text-white w-full heavy py-6 rounded-3xl text-[14px] uppercase mb-5 shadow-lg animate-pulse";
            b.innerHTML = "⚡ SELL MARKET NOW";
            b.disabled = false;
        }

        function addTrade(v, t) {
            trades.unshift({ id: Date.now(), val: v, type: t, time: new Date().toLocaleTimeString('fr-FR') });
            save();
        }

        function deleteTrade(id) {
            trades = trades.filter(x => x.id !== id);
            save();
        }

        function resetSession() {
            if(confirm("Effacer tout le journal de session ?")) { trades = []; save(); }
        }

        function save() {
            localStorage.setItem('mc_clartepro_v28', JSON.stringify(trades));
            const list = document.getElementById('historyList');
            list.innerHTML = '';
            trades.forEach(x => {
                list.innerHTML += `
                <div class="flex justify-between items-center bg-white p-4 rounded-xl border-2 border-slate-100 shadow-sm">
                    <span class="text-[10px] font-bold text-slate-400">${x.time}</span>
                    <span class="text-base heavy ${x.val > 0 ? 'text-emerald-600' : x.val < 0 ? 'text-red-600' : 'text-slate-500'} uppercase">${x.type} (${x.val>=0?'+':''}${x.val}$)</span>
                    <button onclick="deleteTrade(${x.id})" class="bg-slate-100 text-slate-400 heavy px-3.5 py-1 rounded-lg ml-2 active:bg-red-500 hover:text-red-600">✕</button>
                </div>`;
            });
        }

        function copyVvip() {
            if(!isLocked) return;
            const msg = `⚡ VVIP SIGNAL BY MC ANTHONIO ⚡\n\n🥇 GOLD (XAUUSD)\n📉 SELL NOW @ ${fixedData.entry.toFixed(2)}\n🛑 SL: ${fixedData.sl.toFixed(2)} (50 pips)\n\n💰 TP1: ${fixedData.tps[0].toFixed(2)}\n💰 TP2: ${fixedData.tps[1].toFixed(2)}\n💰 TP3: ${fixedData.tps[2].toFixed(2)}\n💰 TP4: ${fixedData.tps[3].toFixed(2)}\n💰 TP5: ${fixedData.tps[4].toFixed(2)}\n\n🔥 EXÉCUTION MARCHÉ IMMEDIATE !`;
            navigator.clipboard.writeText(msg).then(() => alert("✅ SIGNAL COPIÉ !"));
        }

        window.onload = () => { connectWS(); save(); };
    </script>
</body>
    </html>
