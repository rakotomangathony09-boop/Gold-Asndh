<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VVIP QUANT ELITE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F9FAFB; color: #111827; touch-action: manipulation; }
        .card { background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #E5E7EB; }
        .btn-vvip { background: #D97706; color: white; transition: 0.2s; }
        .btn-vvip:active { transform: scale(0.96); }
        .price-up { color: #059669; }
        .price-down { color: #DC2626; }
    </style>
</head>
<body class="p-4 text-[12px]">

    <div class="flex justify-between items-center mb-4 px-1">
        <h2 class="font-extrabold text-[10px] uppercase tracking-widest text-gray-400">VVIP MC ANTHONIO v21</h2>
        <button onclick="resetSession()" class="text-[8px] font-bold text-red-500 bg-red-50 px-2 py-1 rounded-md uppercase border border-red-100 italic">Reset Session</button>
    </div>

    <div class="card p-6 text-center mb-4 border-b-4 border-amber-500">
        <span class="text-[9px] text-gray-400 uppercase font-bold tracking-widest">XAUUSD Live Price</span>
        <h1 class="text-6xl font-black tracking-tighter my-1" id="priceDisplay">----.--</h1>
        <div id="protectionAlert" class="hidden bg-blue-50 text-blue-700 text-[10px] font-bold py-2 rounded-lg animate-pulse mt-2">🛡️ SÉCURISER : DÉPLACER SL AU P.E (BE)</div>
    </div>

    <div class="grid grid-cols-2 gap-3 mb-4">
        <div class="card p-3 text-center border-t-2 border-blue-500">
            <div class="text-[8px] text-gray-400 uppercase font-bold">Probabilité</div>
            <div class="font-extrabold text-blue-600 text-sm">88% HIGH</div>
        </div>
        <div class="card p-3 text-center border-t-2 border-amber-500">
            <div class="text-[8px] text-gray-400 uppercase font-bold">Positions</div>
            <div class="font-extrabold text-gray-800 text-sm">3 POSITIONS</div>
        </div>
    </div>

    <div id="signalContainer" class="card p-4 mb-4 transition-all duration-500">
        <div class="flex justify-between items-center mb-3">
            <span id="setupLabel" class="font-bold uppercase text-[9px] text-gray-400 italic">Scanning Supply Zone...</span>
            <span id="lockStatus" class="bg-gray-100 text-gray-500 text-[8px] px-2 py-0.5 rounded-full font-bold uppercase">Ready</span>
        </div>
        <div class="space-y-3 opacity-20" id="levelData">
            <div class="flex justify-between border-b border-gray-50 pb-2">
                <span class="text-gray-400 font-bold uppercase text-[9px]">Sell Market @</span>
                <span id="fixEntry" class="font-black text-2xl text-amber-600">----.--</span>
            </div>
            <div class="flex justify-between items-center px-1">
                <div class="flex flex-col"><span class="text-[8px] text-gray-400 uppercase">Stop Loss</span><span id="fixSL" class="font-bold text-red-500 text-lg">--</span></div>
                <div class="flex flex-col text-right"><span class="text-[8px] text-gray-400 uppercase">Take Profit</span><span id="fixTP" class="font-bold text-green-600 text-lg">--</span></div>
            </div>
        </div>
    </div>

    <button id="copyBtn" onclick="copyVvip()" class="bg-gray-100 text-gray-400 w-full font-black py-5 rounded-2xl text-[12px] uppercase mb-4 shadow-sm cursor-not-allowed">
        ❌ Aucun Signal Détecté
    </button>

    <div class="card p-4">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-[10px] font-black uppercase tracking-tight">Journal de Session</h3>
            <div class="flex gap-1">
                <button onclick="recordTrade(30, 'GAIN')" class="bg-green-600 text-white px-3 py-1.5 rounded-lg text-[9px] font-bold shadow-sm">GAIN</button>
                <button onclick="recordTrade(0, 'BE')" class="bg-gray-200 text-gray-700 px-3 py-1.5 rounded-lg text-[9px] font-bold shadow-sm">B.E</button>
                <button onclick="recordTrade(-10, 'PERTE')" class="bg-red-600 text-white px-3 py-1.5 rounded-lg text-[9px] font-bold shadow-sm">PERTE</button>
            </div>
        </div>
        <div id="historyList" class="space-y-2 max-h-40 overflow-y-auto">
            </div>
    </div>

    <script>
        let isLocked = false;
        let lastPrice = 0;
        let fixedData = { entry: 0, sl: 0, tp: 0 };
        let trades = JSON.parse(localStorage.getItem('mc_v21_journal')) || [];
        const GOLDEN_ZONE = 5130.00;

        function connectWS() {
            const ws = new WebSocket('wss://stream.binance.com:9443/ws/paxgusdt@ticker');
            ws.onmessage = (event) => {
                const price = parseFloat(JSON.parse(event.data).c);
                const display = document.getElementById('priceDisplay');
                display.innerText = price.toFixed(2);
                display.className = price > lastPrice ? "text-6xl font-black tracking-tighter price-up" : "text-6xl font-black tracking-tighter price-down";
                
                // Protection des gains (Si profit > 10 pts)
                if (isLocked && (fixedData.entry - price) >= 10.00) {
                    document.getElementById('protectionAlert').classList.remove('hidden');
                }

                if (!isLocked && price >= GOLDEN_ZONE) {
                    triggerLock(price);
                }
                lastPrice = price;
            };
        }

        function triggerLock(price) {
            isLocked = true;
            fixedData.entry = price;
            fixedData.sl = price + 24;
            fixedData.tp = price - 72;

            document.getElementById('signalContainer').className = "card p-4 mb-4 border-l-8 border-red-600 bg-red-50/30";
            document.getElementById('levelData').classList.remove('opacity-20');
            document.getElementById('setupLabel').innerText = "VVIP INSTITUTIONAL SELL";
            document.getElementById('setupLabel').className = "font-black uppercase text-[10px] text-red-600 animate-pulse";
            document.getElementById('fixEntry').innerText = price.toFixed(2);
            document.getElementById('fixSL').innerText = fixedData.sl.toFixed(2);
            document.getElementById('fixTP').innerText = fixedData.tp.toFixed(2);
            document.getElementById('lockStatus').innerText = "🔴 LIVE NOW";
            document.getElementById('lockStatus').className = "bg-red-600 text-white text-[8px] px-2 py-0.5 rounded-full font-bold";

            const btn = document.getElementById('copyBtn');
            btn.className = "bg-amber-600 text-white w-full font-black py-5 rounded-2xl text-[12px] uppercase shadow-lg animate-bounce mt-2";
            btn.innerHTML = "⚡ SELL MARKET NOW";
            btn.disabled = false;
        }

        function recordTrade(val, type) {
            const newTrade = { id: Date.now(), amount: val, type: type, date: new Date().toLocaleTimeString('fr-FR') };
            trades.unshift(newTrade);
            saveAndRefresh();
        }

        function deleteTrade(id) {
            trades = trades.filter(t => t.id !== id);
            saveAndRefresh();
        }

        function resetSession() {
            if (confirm("Voulez-vous vider tout le journal de session ?")) {
                trades = [];
                saveAndRefresh();
            }
        }

        function saveAndRefresh() {
            localStorage.setItem('mc_v21_journal', JSON.stringify(trades));
            const list = document.getElementById('historyList');
            list.innerHTML = '';
            trades.forEach(t => {
                list.innerHTML += `
                    <div class="flex justify-between items-center bg-gray-50 p-3 rounded-xl border border-gray-100">
                        <span class="text-[9px] font-bold text-gray-400">${t.date}</span>
                        <span class="font-black ${t.amount > 0 ? 'text-green-600' : t.amount < 0 ? 'text-red-600' : 'text-gray-500'} uppercase">${t.type} (${t.amount >= 0 ? '+' : ''}${t.amount}$)</span>
                        <button onclick="deleteTrade(${t.id})" class="text-gray-300 font-bold px-2 hover:text-red-500">✕</button>
                    </div>`;
            });
        }

        function copyVvip() {
            if (!isLocked) return;
            const text = `⚡ VVIP MARKET ORDER BY MC ANTHONIO ⚡\n\n🥇 GOLD (XAUUSD)\n📉 SELL NOW @ ${fixedData.entry.toFixed(2)}\n\n🛑 SL: ${fixedData.sl.toFixed(2)}\n💰 TP: ${fixedData.tp.toFixed(2)}\n\n📊 PROBA: 88%\n💼 GESTION: 3 POSITIONS`;
            navigator.clipboard.writeText(text).then(() => alert("Signal copié avec succès !"));
        }

        window.onload = () => { connectWS(); saveAndRefresh(); };
    </script>
</body>
</html>
